<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Odisse — Concursos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar__mark">ODISSE · RADAR</div>
    <nav class="topbar__nav">
      <a class="topbar__nav-link topbar__nav-link--active" href="index.html">Concursos</a>
      <a class="topbar__nav-link" href="terrenos.html">Terrenos</a>
    </nav>
    <div class="topbar__meta"></div>
  </header>

  <main class="stage">
    <div class="stage__col">
      <div class="stage__header">
        <div class="stage__intro">
          <p class="step__eyebrow">Radar</p>
          <h1 class="step__title">Concursos em monitoramento</h1>
        </div>
        <div class="stage__controls">
          <div class="filter-group" id="filter-group" role="group" aria-label="Filtrar concursos">
            <button type="button" class="filter-btn" data-filter="novos">Novos</button>
            <button type="button" class="filter-btn filter-btn--active" data-filter="ativos">Monitoramento ativo</button>
            <button type="button" class="filter-btn" data-filter="arquivados">Arquivados</button>
            <button type="button" class="filter-btn" data-filter="todos">Todos</button>
          </div>
          <span class="updated-at" id="updated-at"></span>
        </div>
      </div>

      <div class="stack" id="stack" aria-live="polite"></div>
      <p class="empty-state" id="empty-state" hidden>
        Nenhum concurso encontrado para esse filtro. Selecione "Todos" acima para ver o histórico completo.
      </p>
    </div>
  </main>

  <footer class="footer">
    <span id="footer-count"></span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
